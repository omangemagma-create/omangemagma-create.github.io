<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>July Mystery</title>
<style>
  body {
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    text-align: center;
  }
  img {
    max-width: 80%;
    height: auto;
    margin-bottom: 20px;
  }
  #countdown {
    font-size: 24px;
    color: red;
    margin-top: 10px;
  }
  input {
    padding: 10px;
    font-size: 18px;
    margin-top: 20px;
  }
  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    margin-left: 10px;
  }
</style>
</head>
<body>

<h1>Riddle me this...</h1>
<p>What does a liar do when he's dead?</p>

<input type="password" id="pass">
<button onclick="checkPassword()">Solve</button>

<img id="mainImage" src="batman.jpg" style="display:none;">
<div id="countdown"></div>

<script>
// Délka odpočtu: 28 dní, 6 hodin, 42 minut, 12 sekund
var countdownSeconds = (28*24*60*60) + (6*60*60) + (42*60) + 12;
var countdownElement = document.getElementById("countdown");
var imageElement = document.getElementById("mainImage");

function startCountdown() {
  imageElement.style.display = "block"; // zobraz obrázek
  var interval = setInterval(function() {
    var days = Math.floor(countdownSeconds / (24*60*60));
    var hours = Math.floor((countdownSeconds % (24*60*60)) / (60*60));
    var minutes = Math.floor((countdownSeconds % (60*60)) / 60);
    var seconds = countdownSeconds % 60;

    countdownElement.innerHTML = "Revealing in: " 
      + days + " days, " 
      + hours + " hours, " 
      + minutes + " minutes, and " 
      + seconds + " seconds";

    if(countdownSeconds <= 0) {
      clearInterval(interval);
      countdownElement.innerHTML = "The mystery is revealed!";
    }

    countdownSeconds--;
  }, 1000);
}

function checkPassword() {
  var password = document.getElementById('pass').value;
  if(password === 'He lies still') {
    startCountdown();
  } else {
    alert('Wrong answer.');
  }
}
</script>

</body>
</html>
